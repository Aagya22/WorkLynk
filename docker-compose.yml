version: '3.8'

services:
  db:
    image: mongo:6-jammy
    container_name: worklynk_db
    restart: always
    environment:
      MONGO_INITDB_DATABASE: worklynk
      MONGO_INITDB_ROOT_USERNAME: worklynk_admin
      MONGO_INITDB_ROOT_PASSWORD: worklynk_dev_secure_password_123
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - worklynk_network

  backend:
    build:
      context: "./worklynk backend"
      dockerfile: Dockerfile
    container_name: worklynk_backend
    restart: always
    ports:
      - "5001:5001"
    environment:
      NODE_ENV: development
      PORT: 5001
      DATABASE_URL: mongodb://worklynk_admin:worklynk_dev_secure_password_123@db:27017/worklynk?authSource=admin
      JWT_SECRET: worklynk_dev_super_secret_jwt_key_2026
      JWT_REFRESH_SECRET: worklynk_dev_super_secret_jwt_refresh_key_2026
      COOKIE_SECRET: worklynk_dev_cookie_secret_signing_key
      MFA_APP_NAME: Worklynk
      HCAPTCHA_SECRET: "0x0000000000000000000000000000000000000000"
      FRONTEND_URL: http://localhost:5000
    volumes:
      - "./worklynk backend:/app"
      - /app/node_modules
    depends_on:
      - db
    networks:
      - worklynk_network

  frontend:
    build:
      context: "./worklynk frontend"
      dockerfile: Dockerfile
    container_name: worklynk_frontend
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - "./worklynk frontend:/app"
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5001
      - VITE_HCAPTCHA_SITEKEY=10000000-ffff-ffff-ffff-000000000001
    depends_on:
      - backend
    networks:
      - worklynk_network

networks:
  worklynk_network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local

